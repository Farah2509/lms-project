<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Profile</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#f4f6fb;
}

/* Navbar */

.navbar{
background:#1e293b;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

.nav-links a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:500;
}

/* Profile card */

.container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.profile-card{
background:white;
padding:40px;
width:420px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.profile-card h2{
text-align:center;
margin-bottom:30px;
}

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
margin-bottom:6px;
font-weight:500;
}

.input-group input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#4f46e5;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#4338ca;
}
.profile-container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.profile-card{
background:white;
width:420px;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

.profile-avatar{
width:90px;
height:90px;
border-radius:50%;
background:linear-gradient(135deg,#6366f1,#4f46e5);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
margin:0 auto 20px auto;
font-weight:bold;
}

.profile-card h2{
margin-bottom:20px;
}

.profile-card label{
display:block;
text-align:left;
margin-bottom:5px;
font-weight:500;
}

.profile-card input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:15px;
}

.profile-card button{
width:100%;
padding:12px;
background:#4f46e5;
border:none;
color:white;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.profile-card button:hover{
background:#4338ca;
}

/* Navbar avatar */

#profilePic{
margin-bottom:20px;
}
.nav-links{
display:flex;
align-items:center;
gap:20px;
}

.nav-avatar{
width:35px;
height:35px;
border-radius:50%;
background:#6366f1;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}
.upload-btn{
display:inline-block;
background:#6366f1;
color:white;
padding:8px 18px;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
}

.upload-btn:hover{
background:#4f46e5;
}

</style>
</head>

<body>

<div class="navbar">

<h2>LMS</h2>

<div class="nav-links">

<a href="student/courses.html">Courses</a>
<a href="#">My Courses</a>
<a href="profile.html">My Profile</a>

<div id="navAvatar" class="nav-avatar"></div>

</div>

</div>

<div class="container">

<div class="profile-card">

<div class="profile-avatar" id="avatarLetter">M</div>

<label for="profilePic" class="upload-btn">Upload Photo</label>
<input type="file" id="profilePic" accept="image/*" hidden>

<h2>My Profile</h2>

<form id="profileForm">

<div class="input-group">
<label>Name</label>
<input type="text" id="name">
</div>

<div class="input-group">
<label>Email</label>
<input type="text" id="email" disabled>
</div>

<div class="input-group">
<label>Bio</label>
<input type="text" id="bio">
</div>

<button type="submit">Update Profile</button>

</form>

</div>

</div>

<script src="profile.js"></script>
</body>
</html>
