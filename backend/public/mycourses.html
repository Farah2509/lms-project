body{

background:#f3f4f6;

}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.course-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.course-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.course-card:hover{
transform:translateY(-5px);
}

.course-card h3{
margin-bottom:10px;
}

.course-card p{
color:#555;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.header{
background:#1e3a8a;
color:white;
text-align:center;
padding:20px;
font-size:22px;
}

.back-btn{
background:#16a34a;
padding:8px 15px;
border-radius:6px;
color:white;
text-decoration:none;
display:inline-block;
margin:15px;
}
.course-card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}
.progress-bar{
width:100%;
height:8px;
background:#e5e7eb;
border-radius:10px;
margin-top:10px;
}

.progress{
height:100%;
width:40%;
background:#4f46e5;
border-radius:10px;
}
