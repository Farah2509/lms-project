<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS Courses</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
text-align:center;
}

header{
background:#1e3a8a;
color:white;
padding:20px;
font-size:24px;
}

.container{
width:80%;
margin:auto;
margin-top:40px;
}

.course-card{
background:white;
padding:20px;
margin:20px auto;
width:60%;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.course-card h3{
margin-bottom:10px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

a{
display:inline-block;
margin-top:20px;
text-decoration:none;
color:#1e3a8a;
font-weight:bold;}

.course-card{
background:white;
padding:25px;
margin:25px auto;
width:55%;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:transform 0.2s;
}

.course-card:hover{
transform:scale(1.03);

button{
background:linear-gradient(135deg,#2563eb,#1e40af);
color:white;
border:none;
padding:10px 22px;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1e40af;

header{
background:linear-gradient(135deg,#1e3a8a,#1e40af);
color:white;
padding:18px;
font-size:26px;
font-weight:bold;}

.mycourses-btn{
display:inline-block;
margin-top:30px;
background:#10b981;
color:white;
padding:10px 18px;
border-radius:6px;
text-decoration:none;
}

.mycourses-btn:hover{
background:#059669;

footer{
margin-top:40px;
padding:15px;
background:#111827;
color:white;}

#searchCourse{
padding:10px;
width:300px;
border-radius:6px;
border:1px solid #ccc;
margin-top:20px;}

button:disabled{
background:#9ca3af;
cursor:not-allowed;
}
}
}
}

</style>
</head>

<body>

<footer>
<p>© 2026 LMS Project | Built with MERN Stack</p>
</footer>


<header>
    <h1>📚 Available Courses</h1>

    <input type="text" id="searchCourse" placeholder="Search courses..." onkeyup="searchCourses()">
</header>
<p id="courseCount"></p>

<div class="container" id="courseContainer">
    <div class="empty">Loading courses...</div>
</div>
<br>
<!-- <a href="mycourses.html">My Enrolled Courses</a>
<br> -->
<a class="mycourses-btn" href="mycourses.html">My Enrolled Courses</a>
<a href="student/mycourses.html">My Courses</a>

<!-- IMPORTANT: connect JS -->
<script src="courses.js"></script>
<script>
window.location.href = "login.html";
async function enrollCourse(courseId){

const user = JSON.parse(localStorage.getItem("user"));

await fetch("http://localhost:5000/api/enrollments",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
studentId:user._id,
courseId:courseId
})
});

alert("Course Enrolled");

}
</script>

</body>
</html>
