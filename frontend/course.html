<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Course | LMS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Add New Course</h2>

  <form id="courseForm">

    <input type="text" id="title" placeholder="Course Title" required><br><br>

    <textarea id="description" placeholder="Course Description" required></textarea><br><br>

    <input type="text" id="videoUrl" placeholder="Video URL (YouTube Link)" required><br><br>

    <button type="submit">Add Course</button>
    <a href="mycourses.html">My Enrolled Courses</a>

  </form>

  <p id="msg"></p>

  <script src="course.js"></script>
</body>
</html>
